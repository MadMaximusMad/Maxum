<svg xmlns="http://www.w3.org/2000/svg" width="1707" height="667" viewBox="0 0 1280 500" fill="none">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1c75bc"/></marker></defs>
<style>text{font-family:Arial,sans-serif;fill:#12324a} .t{font-size:28px;font-weight:700} .s{font-size:20px} .box{fill:#f7fbff;stroke:#1c75bc;stroke-width:3;rx:24} .line{stroke:#1c75bc;stroke-width:4;stroke-linecap:round} .soft{fill:#eaf4fb;stroke:#1c75bc;stroke-width:3;rx:20}</style>

<rect x="120" y="150" width="320" height="200" class="box"/>
<text x="280" y="215" text-anchor="middle" class="t">Temporary Liquidity</text>
<text x="280" y="255" text-anchor="middle" class="s">provider can withdraw</text>
<text x="280" y="290" text-anchor="middle" class="s">depends on incentives</text>
<rect x="840" y="150" width="320" height="200" class="box"/>
<text x="1000" y="215" text-anchor="middle" class="t">Permanent Liquidity</text>
<text x="1000" y="255" text-anchor="middle" class="s">system-owned and retained</text>
<text x="1000" y="290" text-anchor="middle" class="s">earns fees and supports apps</text>
<path d="M500 250H780" class="line" marker-end="url(#arrow)"/>
<rect x="500" y="190" width="280" height="120" class="soft"/>
<text x="640" y="245" text-anchor="middle" class="t">Maxum Upgrade</text>
<text x="640" y="280" text-anchor="middle" class="s">capture → own → compound</text>

</svg>